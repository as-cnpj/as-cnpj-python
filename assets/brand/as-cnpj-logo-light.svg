<svg xmlns="http://www.w3.org/2000/svg" width="600" height="160" viewBox="0 0 600 160">
  <defs>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="55%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#6A9A58"/>
    </linearGradient>
  </defs>

  <rect width="600" height="160" rx="16" fill="#F5F4EE"/>

  <!-- anéis decorativos -->
  <circle cx="80" cy="80" r="68" fill="none" stroke="#F97316" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="80" cy="80" r="52" fill="none" stroke="#84A870" stroke-width="0.5" stroke-opacity="0.18"/>

  <!-- badge AS -->
  <rect x="44" y="44" width="72" height="72" rx="18" fill="url(#badge)"/>
  <text x="80" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">AS</text>

  <!-- separador vertical -->
  <line x1="140" y1="52" x2="140" y2="108" stroke="#D6D3CD" stroke-width="0.8"/>

  <!-- wordmark -->
  <text x="160" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" fill="url(#txt)" letter-spacing="-1.5">AS-CNPJ</text>

  <!-- tagline -->
  <text x="160" y="118" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="400" fill="#A8A29E" letter-spacing="0.2">Bibliotecas autorais para CNPJ numérico e alfanumérico</text>
</svg>
