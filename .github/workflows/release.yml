name: Release PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: pypi-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish as-cnpj
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Assert release tag matches package version
        shell: python
        run: |
          import pathlib
          import tomllib

          tag = "${{ github.event.release.tag_name }}"
          pyproject = pathlib.Path("pyproject.toml").read_bytes()
          version = tomllib.loads(pyproject.decode("utf-8"))["project"]["version"]

          if tag != f"v{version}":
              raise SystemExit(f"Release tag {tag} does not match pyproject.toml version v{version}")

      - name: Install packaging tools
        run: python -m pip install --upgrade build twine

      - name: Syntax check
        run: python -m compileall src

      - name: Run tests
        run: python -m unittest discover -s test -p "test_*.py"

      - name: Build distributions
        run: python -m build --sdist --wheel --outdir dist

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
